<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Python Programs — VS Code IDE</title>
  <link rel="icon" href="https://raw.githubusercontent.com/PiyushJT/PiyushJT/00ca33b80496d6ca543332f53b314e62ddf3e37b/icons/python.svg" type="image/svg+xml">
  <meta name="description" content="Browse and search the Python-Material GitHub repository">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Segoe+UI:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* VS Code Dark+ color palette */
      --vsc-bg:           #1e1e1e;
      --vsc-sidebar:      #252526;
      --vsc-activity:     #333333;
      --vsc-titlebar:     #3c3c3c;
      --vsc-tab-active:   #1e1e1e;
      --vsc-tab-inactive: #2d2d2d;
      --vsc-tab-border:   #252526;
      --vsc-statusbar:    #007acc;
      --vsc-statusbar-fg: #ffffff;
      --vsc-panel:        #1e1e1e;
      --vsc-panel-header: #252526;
      --vsc-border:       #3c3c3c;
      --vsc-border-light: #454545;
      --vsc-hover:        rgba(255,255,255,0.06);
      --vsc-selected:     #094771;
      --vsc-focused:      #0d6199;
      --vsc-input-bg:     #3c3c3c;
      --vsc-input-border: #3c3c3c;
      --vsc-input-focus:  #007acc;
      --vsc-scrollbar:    rgba(121,121,121,0.4);
      --vsc-scrollbar-h:  rgba(121,121,121,0.7);

      /* Token colors */
      --tok-fg:        #d4d4d4;
      --tok-comment:   #6a9955;
      --tok-string:    #ce9178;
      --tok-keyword:   #569cd6;
      --tok-builtin:   #dcdcaa;
      --tok-number:    #b5cea8;
      --tok-decorator: #c586c0;
      --tok-defname:   #4ec9b0;
      --tok-classname: #4ec9b0;
      --tok-operator:  #d4d4d4;
      --tok-type:      #4ec9b0;

      /* Accents */
      --blue:    #007acc;
      --blue-lt: #3794ff;
      --green:   #4ec9b0;
      --orange:  #ce9178;
      --purple:  #c586c0;
      --yellow:  #dcdcaa;
      --red:     #f44747;
      --cyan:    #4fc1ff;

      --activity-w: 48px;
      --sidebar-w: 260px;
      --statusbar-h: 22px;
      --tabbar-h: 35px;
      --titlebar-h: 30px;
      --mobile-header-h: 44px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--vsc-bg);
      color: var(--tok-fg);
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ─── Scrollbar ─── */
    * { scrollbar-width: thin; scrollbar-color: var(--vsc-scrollbar) transparent; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--vsc-scrollbar); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--vsc-scrollbar-h); }

    /* ═══════════════════════════════════════
       LAYOUT SHELL
    ═══════════════════════════════════════ */
    #ide {
      display: grid;
      grid-template-rows: var(--titlebar-h) 1fr var(--statusbar-h);
      grid-template-columns: var(--activity-w) var(--sidebar-w) 1fr;
      grid-template-areas:
        "titlebar titlebar titlebar"
        "activity sidebar editor"
        "statusbar statusbar statusbar";
      height: 100dvh;
      width: 100vw;
    }

    /* hide preinit flash */
    body.preinit #ide { opacity: 0; }

    /* ─── Title Bar ─── */
    #titlebar {
      grid-area: titlebar;
      background: var(--vsc-titlebar);
      border-bottom: 1px solid #252526;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 12px;
      user-select: none;
      position: relative;
      z-index: 100;
    }

    .titlebar-logo {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .titlebar-logo img { width: 16px; height: 16px; }
    .titlebar-logo .name {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.3px;
    }
    .titlebar-logo .name strong { color: rgba(255,255,255,0.9); font-weight: 500; }

    .titlebar-menus {
      display: flex;
      align-items: center;
      gap: 0;
      margin-left: 6px;
    }
    .menu-item {
      padding: 3px 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.1s;
    }
    .menu-item:hover { background: rgba(255,255,255,0.08); color: #fff; }

    .titlebar-search {
      flex: 1;
      display: flex;
      justify-content: center;
    }
    .titlebar-search-inner {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 2px 10px;
      min-width: 280px;
      max-width: 420px;
      width: 100%;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .titlebar-search-inner:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .titlebar-search-inner input {
      background: transparent;
      border: none;
      outline: none;
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      width: 100%;
      font-family: inherit;
    }
    .titlebar-search-inner input::placeholder { color: rgba(255,255,255,0.35); }
    .titlebar-search-inner svg { flex-shrink: 0; opacity: 0.5; }

    .titlebar-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
    }
    .titlebar-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 3px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.1s;
    }
    .titlebar-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .titlebar-btn svg { opacity: 0.8; }

    /* ─── Activity Bar ─── */
    #activity {
      grid-area: activity;
      background: var(--vsc-activity);
      border-right: 1px solid var(--vsc-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4px 0;
      gap: 2px;
      z-index: 10;
    }

    .act-btn {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: rgba(255,255,255,0.45);
      border-left: 2px solid transparent;
      transition: color 0.12s;
      position: relative;
    }
    .act-btn:hover { color: rgba(255,255,255,0.8); }
    .act-btn.active { color: #fff; border-left-color: #fff; }
    .act-btn svg { width: 24px; height: 24px; }
    .act-btn .badge {
      position: absolute;
      top: 8px; right: 8px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--blue);
    }

    .act-bottom { margin-top: auto; }

    /* ─── Sidebar ─── */
    #sidebar {
      grid-area: sidebar;
      background: var(--vsc-sidebar);
      border-right: 1px solid var(--vsc-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 5;
      transition: width 0.15s ease;
    }

    #sidebar.collapsed { width: 0; border-right: none; }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px 6px 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      flex-shrink: 0;
    }
    .sidebar-header-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      display: flex;
    }
    .sidebar-header-btn:hover { color: #fff; background: rgba(255,255,255,0.06); }

    .sidebar-section {
      padding: 6px 12px 3px 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    .sidebar-section:hover { color: rgba(255,255,255,0.7); }
    .sidebar-section svg { transition: transform 0.15s; }
    .sidebar-section.open svg { transform: rotate(90deg); }

    .sidebar-tree {
      overflow-y: auto;
      flex: 1;
      padding-bottom: 8px;
    }

    .tree-item {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px 3px 0;
      cursor: pointer;
      color: var(--tok-fg);
      border-radius: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
      font-size: 13px;
      line-height: 22px;
      user-select: none;
    }
    .tree-item:hover { background: var(--vsc-hover); }
    .tree-item.active { background: var(--vsc-selected) !important; }
    .tree-item.focused { background: var(--vsc-focused) !important; }
    .tree-item .ti-indent { flex-shrink: 0; }
    .tree-item .ti-arrow {
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: rgba(255,255,255,0.4);
      transition: transform 0.12s;
    }
    .tree-item .ti-arrow.open { transform: rotate(90deg); }
    .tree-item .ti-arrow svg { width: 14px; height: 14px; }
    .tree-item .ti-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .tree-item .ti-icon img { width: 16px; height: 16px; object-fit: contain; }
    .tree-item .ti-name {
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    /* Sidebar search */
    .sidebar-search-wrap {
      padding: 8px 12px;
      flex-shrink: 0;
    }
    .sidebar-search-input {
      width: 100%;
      background: var(--vsc-input-bg);
      border: 1px solid var(--vsc-input-border);
      border-radius: 3px;
      padding: 4px 8px;
      color: var(--tok-fg);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.12s;
    }
    .sidebar-search-input:focus { border-color: var(--vsc-input-focus); }
    .sidebar-search-input::placeholder { color: rgba(255,255,255,0.3); }

    /* ─── Editor Area ─── */
    #editor-area {
      grid-area: editor;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--vsc-bg);
    }

    /* Tab Bar */
    #tabbar {
      height: var(--tabbar-h);
      background: var(--vsc-panel-header);
      border-bottom: 1px solid var(--vsc-border);
      display: flex;
      align-items: stretch;
      overflow-x: auto;
      overflow-y: hidden;
      flex-shrink: 0;
    }
    #tabbar::-webkit-scrollbar { height: 2px; }

    .tab {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
      background: var(--vsc-tab-inactive);
      border-right: 1px solid var(--vsc-tab-border);
      cursor: pointer;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      min-width: 120px;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      user-select: none;
      transition: background 0.1s;
    }
    .tab:hover { background: rgba(255,255,255,0.04); }
    .tab.active {
      background: var(--vsc-tab-active);
      color: #fff;
      border-top: 1px solid var(--blue);
    }
    .tab .tab-icon { width: 14px; height: 14px; flex-shrink: 0; }
    .tab .tab-icon img { width: 14px; height: 14px; }
    .tab .tab-name { flex: 1; overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
    .tab .tab-close {
      width: 18px; height: 18px;
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      flex-shrink: 0;
      transition: opacity 0.1s, background 0.1s;
    }
    .tab:hover .tab-close, .tab.active .tab-close { opacity: 0.7; }
    .tab .tab-close:hover { background: rgba(255,255,255,0.15); opacity: 1; }
    .tab .tab-close svg { width: 10px; height: 10px; }

    /* Breadcrumbs */
    #breadcrumbs {
      height: 26px;
      background: var(--vsc-bg);
      border-bottom: 1px solid var(--vsc-border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 2px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      flex-shrink: 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .crumb {
      display: flex;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      padding: 1px 4px;
      border-radius: 3px;
      color: rgba(255,255,255,0.55);
      transition: color 0.1s, background 0.1s;
    }
    .crumb:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .crumb-sep { opacity: 0.3; margin: 0 1px; }
    .crumb img { width: 12px; height: 12px; margin-right: 3px; }

    /* Editor Content */
    #editor-content {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    /* ─── Home / Welcome Screen ─── */
    .welcome-screen {
      display: grid;
      place-items: center;
      height: 100%;
      background: var(--vsc-bg);
      padding: 20px;
    }
    .welcome-inner {
      max-width: 700px;
      width: 100%;
    }
    .welcome-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .welcome-logo img { width: 52px; height: 52px; }
    .welcome-logo-text h1 {
      font-size: 28px;
      font-weight: 300;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .welcome-logo-text p {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-top: 3px;
    }

    .welcome-search-wrap {
      position: relative;
      margin-bottom: 24px;
    }
    .welcome-search-input {
      width: 100%;
      background: #2d2d2d;
      border: 1px solid #3c3c3c;
      border-radius: 5px;
      padding: 14px 18px 14px 46px;
      color: var(--tok-fg);
      font-size: 15px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .welcome-search-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(0,122,204,0.25);
    }
    .welcome-search-input::placeholder { color: rgba(255,255,255,0.22); }
    .welcome-search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.3);
      pointer-events: none;
    }
    .welcome-clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      padding: 4px;
      border-radius: 3px;
      display: none;
      align-items: center;
    }
    .welcome-clear-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }

    .welcome-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .welcome-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 5px;
      background: #2d2d2d;
      border: 1px solid #3c3c3c;
      color: var(--tok-fg);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: background 0.12s, border-color 0.12s;
      text-decoration: none;
    }
    .welcome-btn:hover { background: #383838; border-color: #4c4c4c; }
    .welcome-btn .wb-icon {
      width: 28px; height: 28px;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .welcome-btn .wb-text strong { display: block; font-size: 13px; font-weight: 500; color: #fff; }
    .welcome-btn .wb-text span { font-size: 11px; color: rgba(255,255,255,0.4); }

    .welcome-btn.primary .wb-icon { background: rgba(0,122,204,0.25); }
    .welcome-btn.primary:hover { border-color: var(--blue); }
    .welcome-btn.secondary .wb-icon { background: rgba(78,201,176,0.2); }
    .welcome-btn.tertiary .wb-icon { background: rgba(197,134,192,0.2); }

    .welcome-quiz-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px;
      border-radius: 5px;
      background: rgba(78,201,176,0.1);
      border: 1px solid rgba(78,201,176,0.3);
      color: #4ec9b0;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      text-decoration: none;
      transition: background 0.12s, border-color 0.12s;
    }
    .welcome-quiz-btn:hover { background: rgba(78,201,176,0.18); border-color: rgba(78,201,176,0.55); }

    /* ─── Folder View ─── */
    .folder-view {
      padding: 12px;
    }
    .folder-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.35);
      padding: 8px 4px 12px 4px;
      font-weight: 600;
    }
    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }
    .folder-card {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px 12px;
      background: #252526;
      border: 1px solid #3c3c3c;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      overflow: hidden;
    }
    .folder-card:hover { background: #2a2d2e; border-color: var(--blue); }
    .folder-card img { width: 18px; height: 18px; flex-shrink: 0; }
    .folder-card span { font-size: 12px; color: var(--tok-fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ─── Code Viewer ─── */
    .code-viewer {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--vsc-bg);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }

    .viewer-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--vsc-bg);
      border-bottom: 1px solid var(--vsc-border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .viewer-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: #2d2d2d;
      border: 1px solid #3c3c3c;
      border-radius: 3px;
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      font-family: 'Segoe UI', sans-serif;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      line-height: 1;
    }
    .viewer-btn:hover { background: #3c3c3c; border-color: #555; }
    .viewer-btn:active { background: #1e1e1e; }
    .viewer-btn.copied { color: #4ec9b0; border-color: rgba(78,201,176,0.5); }
    .viewer-btn svg { width: 14px; height: 14px; opacity: 0.85; }

    .nav-spacer { flex: 1; }

    /* Problem Statement */
    .problem-panel {
      background: rgba(0,122,204,0.06);
      border-left: 3px solid var(--blue);
      border-radius: 0 3px 3px 0;
      padding: 14px 18px;
      margin: 14px 14px 0 14px;
      flex-shrink: 0;
      font-family: 'Segoe UI', sans-serif;
    }
    .problem-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--blue-lt);
      margin-bottom: 8px;
    }
    .problem-text {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    /* Code Block */
    .code-scroll {
      flex: 1;
      overflow: auto;
      padding: 14px 0;
    }
    .code-block {
      display: table;
      width: 100%;
      min-width: 100%;
    }
    .code-line {
      display: table-row;
    }
    .code-line:hover .ln, .code-line:hover .lc { background: rgba(255,255,255,0.03); }
    .ln {
      display: table-cell;
      padding: 0 16px 0 12px;
      text-align: right;
      color: rgba(255,255,255,0.2);
      font-size: 13px;
      line-height: 20px;
      user-select: none;
      border-right: 1px solid rgba(255,255,255,0.05);
      min-width: 50px;
      white-space: nowrap;
      vertical-align: top;
    }
    .lc {
      display: table-cell;
      padding: 0 18px 0 14px;
      font-size: 13px;
      line-height: 20px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--tok-fg);
      vertical-align: top;
    }

    /* Output Panel */
    .output-panel {
      background: #1a1a1a;
      border-top: 1px solid var(--vsc-border);
      flex-shrink: 0;
    }
    .output-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      background: var(--vsc-panel-header);
      border-bottom: 1px solid var(--vsc-border);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.6);
    }
    .output-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ec9b0; }
    .output-body {
      padding: 10px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #4ec9b0;
      line-height: 1.6;
      white-space: pre-wrap;
      max-height: 180px;
      overflow-y: auto;
    }

    /* Nav Row */
    .nav-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      flex-shrink: 0;
      background: var(--vsc-bg);
      border-top: 1px solid var(--vsc-border);
    }

    /* ─── Search Results ─── */
    .search-view {
      padding: 12px;
      font-family: 'Segoe UI', sans-serif;
    }
    .search-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.35);
      padding: 4px 0 10px 2px;
      font-weight: 600;
    }
    .search-item {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.1s;
      margin-bottom: 2px;
    }
    .search-item:hover { background: rgba(255,255,255,0.05); }
    .search-item .si-icon { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }
    .search-item .si-icon img { width: 16px; height: 16px; }
    .search-item .si-path {
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      font-family: 'JetBrains Mono', monospace;
    }
    .search-item .si-path .hl {
      background: rgba(255,200,0,0.25);
      border-bottom: 1px solid rgba(255,200,0,0.5);
      border-radius: 2px;
      padding: 0 1px;
      color: #ffd700;
    }
    .search-item .si-snippet {
      font-size: 11px;
      color: rgba(255,255,255,0.38);
      margin-top: 3px;
      font-family: 'JetBrains Mono', monospace;
    }
    .search-item .si-snippet .hl {
      background: rgba(255,200,0,0.2);
      border-radius: 2px;
      padding: 0 1px;
      color: #ffd700;
    }
    .search-empty { color: rgba(255,255,255,0.3); font-size: 13px; padding: 20px 4px; }

    /* Progress */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 2px 14px 2px;
      color: rgba(255,255,255,0.35);
      font-size: 11px;
    }
    .progress-bar {
      flex: 1;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--blue);
      transition: width 0.1s linear;
    }

    /* ─── Status Bar ─── */
    #statusbar {
      grid-area: statusbar;
      background: var(--vsc-statusbar);
      color: var(--vsc-statusbar-fg);
      display: flex;
      align-items: center;
      gap: 0;
      font-size: 11px;
      height: var(--statusbar-h);
      z-index: 100;
      user-select: none;
    }
    .sb-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0 10px;
      height: 100%;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s;
    }
    .sb-item:hover { background: rgba(255,255,255,0.12); }
    .sb-item svg { width: 12px; height: 12px; }
    .sb-right { margin-left: auto; display: flex; align-items: center; }

    /* ─── Syntax Tokens ─── */
    .tok-comment  { color: var(--tok-comment); font-style: italic; }
    .tok-string   { color: var(--tok-string); }
    .tok-keyword  { color: var(--tok-keyword); }
    .tok-builtin  { color: var(--tok-builtin); }
    .tok-number   { color: var(--tok-number); }
    .tok-decorator{ color: var(--tok-decorator); }
    .tok-defname  { color: var(--tok-defname); }
    .tok-classname{ color: var(--tok-classname); }

    /* ─── Minimap (decorative) ─── */
    .minimap {
      width: 80px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.2);
      border-left: 1px solid var(--vsc-border);
      overflow: hidden;
      position: relative;
    }
    .minimap-lines {
      padding: 8px 6px;
      opacity: 0.35;
    }
    .minimap-line {
      height: 2px;
      border-radius: 1px;
      margin-bottom: 1px;
      background: rgba(255,255,255,0.3);
    }
    .minimap-viewport {
      position: absolute;
      left: 0; right: 0;
      height: 80px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      top: 8px;
    }

    /* ─── Mobile ─── */
    @media (max-width: 900px) {
      :root { --sidebar-w: 0px; --activity-w: 0px; }
      #ide {
        grid-template-columns: 1fr;
        grid-template-rows: var(--mobile-header-h) 1fr var(--statusbar-h);
        grid-template-areas:
          "titlebar"
          "editor"
          "statusbar";
      }
      #activity, #sidebar { display: none; }
      .titlebar-menus { display: none; }
      .welcome-actions { grid-template-columns: 1fr; }
      .minimap { display: none; }
    }

    /* ─── Scrollbar in code ─── */
    .code-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
    .code-scroll::-webkit-scrollbar-track { background: var(--vsc-bg); }
    .code-scroll::-webkit-scrollbar-thumb { background: rgba(121,121,121,0.35); }
  </style>
</head>

<script>
  const OWNER = "dwarkesh777";
  const REPO  = "FSD2";
  const QUIZ_URL = "https://dwarkesh777.github.io/PB-MCQ/";
  const TICK_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4ec9b0" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;

  // ─── State ───────────────────────────────────────────────────────
  const state = {
    defaultBranch: "main",
    nodeByPath: new Map(),
    contentCache: new Map(),
    fileIndex: [],
    programIndex: [],
    searchAbort: null,
    prefetchStarted: false,
    openTabs: [],   // [{path, name}]
    activeTab: null
  };

  // ─── Utils ───────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const toQ = p => Object.entries(p).filter(([,v])=>v!=null&&v!=='').map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join('&');
  const parseLocation = () => {
    const u = new URLSearchParams(location.search);
    return { view: u.get('view')||'home', path: u.get('p')||'', q: u.get('q')||'' };
  };
  function navigate(ns, replace=false) {
    const qs = '?'+toQ(ns);
    replace ? history.replaceState(null,'',location.pathname+qs) : history.pushState(null,'',location.pathname+qs);
    render();
  }
  async function fetchJSON(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }
  function getBasename(p) { return p ? p.split('/').pop() : p; }
  function getParent(p) { if(!p) return ''; const ps=p.split('/'); ps.pop(); return ps.join('/'); }
  function iconFor(path, isDir) {
    if (isDir) return "https://raw.githubusercontent.com/PiyushJT/PiyushJT/1cadac55bb62a80e9bfdc6cc8fb9eefce1d7eee4/icons/folder.svg";
    const ext = (path.split('.').pop()||'').toLowerCase();
    const m = {py:'https://raw.githubusercontent.com/PiyushJT/PiyushJT/00ca33b80496d6ca543332f53b314e62ddf3e37b/icons/python.svg',java:'https://raw.githubusercontent.com/PiyushJT/PiyushJT/00ca33b80496d6ca543332f53b314e62ddf3e37b/icons/java.svg',txt:'https://raw.githubusercontent.com/PiyushJT/PiyushJT/00ca33b80496d6ca543332f53b314e62ddf3e37b/icons/txt.svg',csv:'https://raw.githubusercontent.com/PiyushJT/PiyushJT/00ca33b80496d6ca543332f53b314e62ddf3e37b/icons/csv.svg'};
    return m[ext]||'https://raw.githubusercontent.com/PiyushJT/PiyushJT/00ca33b80496d6ca543332f53b314e62ddf3e37b/icons/file.svg';
  }
  function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function hl(text, q) {
    if (!q) return escapeHtml(text);
    const esc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    return escapeHtml(text).replace(new RegExp(esc,'gi'), m=>`<span class="hl">${m}</span>`);
  }

  // ─── Init ────────────────────────────────────────────────────────
  async function init() {
    const meta = await fetchJSON(`https://api.github.com/repos/${OWNER}/${REPO}`);
    state.defaultBranch = meta.default_branch||'main';
    $('sbBranch').innerHTML = `<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="9" r="2"/><path d="M6 8v8"/><path d="M18 9c0-3-3-4-6-2L6 8"/></svg> ${state.defaultBranch}`;
    const rootTree = await fetchJSON(`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${encodeURIComponent(state.defaultBranch)}`);
    const allEntries = await loadAllEntries(rootTree.tree, '');
    buildIndexes(allEntries);
    render(true);
    document.body.classList.remove('preinit');
    $('sbStatus').textContent = `✓ ${state.fileIndex.length} files indexed`;
    if (!state.prefetchStarted) { state.prefetchStarted=true; prefetchSmallFiles().catch(()=>{}); }
  }

  async function loadAllEntries(entries, parentPath) {
    const all = [], trees = [];
    for (const e of entries) {
      const fullPath = parentPath ? `${parentPath}/${e.path}` : e.path;
      const node = { ...e, path: fullPath };
      all.push(node);
      if (e.type === 'tree') trees.push(node);
    }
    const concurrency = 5;
    for (let i=0; i<trees.length; i+=concurrency) {
      const batch = trees.slice(i, i+concurrency);
      const results = await Promise.all(batch.map(async d => {
        try {
          const dt = await fetchJSON(`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${d.sha}`);
          return loadAllEntries(dt.tree, d.path);
        } catch { return []; }
      }));
      for (const sub of results) all.push(...sub);
    }
    return all;
  }

  function buildIndexes(allEntries) {
    const root = { type:'tree', name:'', path:'', children:new Map() };
    state.nodeByPath.set('', root);
    for (const e of allEntries) {
      const parts = e.path.split('/');
      let cur = root;
      for (let i=0; i<parts.length; i++) {
        const name=parts[i], isLast=i===parts.length-1;
        const childPath=parts.slice(0,i+1).join('/');
        if (!cur.children.has(name)) {
          const node = { type: isLast?(e.type==='tree'?'tree':'blob'):'tree', name, path:childPath, children:new Map(), sha:isLast?e.sha:undefined };
          cur.children.set(name, node);
          state.nodeByPath.set(childPath, node);
        }
        cur = cur.children.get(name);
      }
    }
    const files = [...state.nodeByPath.values()].filter(n=>n.type==='blob');
    state.fileIndex = files.sort((a,b)=>a.path.localeCompare(b.path));
    state.programIndex = state.fileIndex.filter(f=>/\.py$/i.test(f.path));
  }

  // ─── Render ──────────────────────────────────────────────────────
  function render(replacing=false) {
    const { view, path, q } = parseLocation();
    renderTabs(view, path);
    renderBreadcrumbs(view, path, q);
    renderSidebar(view, path, q);
    const content = $('editor-content');
    if (view === 'home')   renderHome(content);
    else if (view === 'browse') renderFolder(path, content);
    else if (view === 'file')   renderFile(path, content);
    else if (view === 'search') renderSearch(q, content);
    else renderHome(content);
  }

  // ─── TABS ────────────────────────────────────────────────────────
  function renderTabs(view, path) {
    // add tab if opening a file
    if (view === 'file' && path) {
      if (!state.openTabs.find(t=>t.path===path))
        state.openTabs.push({ path, name: getBasename(path) });
      state.activeTab = path;
    }
    if (view === 'home') { state.activeTab = '__home__'; if (!state.openTabs.find(t=>t.path==='__home__')) state.openTabs.unshift({path:'__home__',name:'Welcome'}); }
    if (view === 'search') { state.activeTab = '__search__'; if (!state.openTabs.find(t=>t.path==='__search__')) state.openTabs.push({path:'__search__',name:'Search Results'}); }

    const tc = $('tabsContainer');
    tc.innerHTML = '';
    for (const tab of state.openTabs) {
      const isActive = tab.path === state.activeTab;
      const div = document.createElement('div');
      div.className = 'tab' + (isActive ? ' active' : '');
      const isSpecial = tab.path === '__home__' || tab.path === '__search__';
      const iconUrl = isSpecial ? 'https://raw.githubusercontent.com/PiyushJT/PiyushJT/00ca33b80496d6ca543332f53b314e62ddf3e37b/icons/python.svg' : iconFor(tab.path, false);
      div.innerHTML = `
        <span class="tab-icon"><img src="${iconUrl}" alt=""></span>
        <span class="tab-name">${tab.name}</span>
        <span class="tab-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg></span>
      `;
      div.addEventListener('click', (e) => {
        if (e.target.closest('.tab-close')) {
          state.openTabs = state.openTabs.filter(t=>t.path!==tab.path);
          if (state.activeTab === tab.path) {
            const last = state.openTabs[state.openTabs.length-1];
            if (last) {
              if (last.path==='__home__') navigate({view:'home'},true);
              else if (last.path==='__search__') navigate({view:'search',q:''},true);
              else navigate({view:'file',p:last.path},true);
            } else navigate({view:'home'},true);
          } else renderTabs(parseLocation().view, parseLocation().path);
          return;
        }
        if (tab.path==='__home__') navigate({view:'home'},true);
        else if (tab.path==='__search__') navigate({view:'search',q:''},true);
        else navigate({view:'file',p:tab.path},true);
      });
      tc.appendChild(div);
    }
  }

  // ─── BREADCRUMBS ────────────────────────────────────────────────
  function renderBreadcrumbs(view, path, q) {
    const bc = $('breadcrumbs');
    bc.innerHTML = '';
    const add = (label, st, iconUrl) => {
      const span = document.createElement('span');
      span.className = 'crumb';
      span.innerHTML = (iconUrl ? `<img src="${iconUrl}" alt="">` : '') + label;
      span.addEventListener('click', ()=>navigate(st));
      bc.appendChild(span);
      const sep = document.createElement('span');
      sep.className = 'crumb-sep';
      sep.textContent = '›';
      bc.appendChild(sep);
    };
    if (view === 'home') { const s=document.createElement('span'); s.className='crumb'; s.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> Welcome'; bc.appendChild(s); return; }
    add('FSD2', {view:'browse',p:''});
    if (view === 'search') { const s=document.createElement('span'); s.className='crumb'; s.textContent=`Search: "${q}"`; bc.appendChild(s); return; }
    const parts = path ? path.split('/') : [];
    let acc = '';
    for (let i=0; i<parts.length; i++) {
      acc = i===0 ? parts[0] : `${acc}/${parts[i]}`;
      const isLast = i===parts.length-1;
      const isDir = !isLast || view==='browse';
      add(parts[i], isDir ? {view:'browse',p:acc} : {view:'file',p:acc}, iconFor(acc, isDir));
    }
    // remove trailing sep
    if (bc.lastChild && bc.lastChild.className==='crumb-sep') bc.removeChild(bc.lastChild);
  }

  // ─── SEARCH ──────────────────────────────────────────────────────
  function cancelSearch() { if(state.searchAbort){ state.searchAbort.aborted=true; state.searchAbort=null; } }

  async function renderSearch(query, container) {
    cancelSearch();
    const guard = { aborted: false };
    state.searchAbort = guard;
    const q = (query||'').trim();
    container.innerHTML = '';

    const wrap = document.createElement('div');
    wrap.className = 'search-view';

    if (!q) {
      wrap.innerHTML = `<div class="search-empty">Type a query in the search bar above and press Enter.</div>`;
      container.appendChild(wrap);
      return;
    }

    const header = document.createElement('div');
    header.className = 'search-header';
    header.textContent = `Results for "${q}"`;
    wrap.appendChild(header);

    const progressWrap = document.createElement('div');
    progressWrap.className = 'progress-wrap';
    progressWrap.innerHTML = `<div class="progress-bar"><div class="progress-fill" id="srchProg"></div></div><span>Scanning…</span>`;
    wrap.appendChild(progressWrap);

    const list = document.createElement('div');
    wrap.appendChild(list);
    container.appendChild(wrap);

    const lower = q.toLowerCase();
    function addResult(kind, path, snippet) {
      const div = document.createElement('div');
      div.className = 'search-item';
      const isDir = kind==='folder';
      div.innerHTML = `
        <span class="si-icon"><img src="${iconFor(path,isDir)}" alt=""></span>
        <div>
          <div class="si-path">${hl(path,q)}</div>
          ${snippet ? `<div class="si-snippet">… ${hl(snippet,q)} …</div>` : ''}
        </div>
      `;
      div.addEventListener('click',()=>navigate({view:isDir?'browse':'file',p:path}));
      list.appendChild(div);
    }

    // Folders
    [...state.nodeByPath.values()].filter(n=>n.type==='tree'&&n.path&&n.name.toLowerCase().includes(lower)).sort((a,b)=>a.path.localeCompare(b.path)).forEach(f=>addResult('folder',f.path,''));
    // Files by name
    const nameMatches = state.fileIndex.filter(f=>getBasename(f.path).toLowerCase().includes(lower));
    nameMatches.forEach(f=>addResult('file',f.path,''));
    // Content
    const remaining = state.fileIndex.filter(f=>!nameMatches.includes(f));
    const concurrency=6; let idx=0, inFlight=0, foundAny=false;
    const prog = $('srchProg');
    const step = async () => {
      if (guard.aborted) return;
      if (idx>=remaining.length) { if(inFlight===0){ if(!foundAny&&list.children.length===0){ const n=document.createElement('div'); n.className='search-empty'; n.textContent='No matches.'; list.appendChild(n); } progressWrap.remove(); } return; }
      const file=remaining[idx++]; inFlight++;
      try {
        const key=`${state.defaultBranch}:${file.path}`;
        let text=state.contentCache.get(key);
        if(!text){
          const url=`https://raw.githubusercontent.com/${OWNER}/${REPO}/${encodeURIComponent(state.defaultBranch)}/${encodeURI(file.path)}`;
          const res=await fetch(url);
          if(res.ok){ const chunks=[]; const reader=res.body.getReader(); let recv=0;
            while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);recv+=value.byteLength;if(recv>200*1024)break;}
            text=new TextDecoder().decode(concatU8(chunks)); state.contentCache.set(key,text); }
        }
        if(text&&text.toLowerCase().includes(lower)){
          foundAny=true;
          const si=text.toLowerCase().indexOf(lower);
          const snippet=text.slice(Math.max(0,si-40),Math.min(text.length,si+q.length+40));
          addResult('file',file.path,snippet);
        }
      } catch(e){}
      finally{
        inFlight--;
        const pct=Math.round((Math.min(idx,remaining.length)-inFlight)/remaining.length*100);
        if(prog) prog.style.width=pct+'%';
        step();
      }
    };
    for(let i=0;i<concurrency&&i<remaining.length;i++) step();
    if(remaining.length===0) progressWrap.remove();
  }

  function concatU8(chunks){ const t=chunks.reduce((s,c)=>s+c.byteLength,0); const o=new Uint8Array(t); let off=0; for(const c of chunks){o.set(c,off);off+=c.byteLength;} return o; }

  // ─── PYTHON PARSER ────────────────────────────────────────────────
  function parsePythonFile(content) {
    const lines = content.split('\n');
    let inDoc=false, docType=null, docStart=-1, docContent=[];
    const docstrings=[];
    for(let i=0;i<lines.length;i++){
      const l=lines[i];
      if(!inDoc){
        const td=l.indexOf('"""'), ts=l.indexOf("'''");
        let dt=null, di=-1;
        if(td!==-1&&(ts===-1||td<ts)){dt='"""';di=td;}
        else if(ts!==-1){dt="'''";di=ts;}
        if(dt){
          inDoc=true;docType=dt;docStart=i;
          const after=l.substring(di+3);
          if(after.includes(dt)){const ei=after.indexOf(dt);docstrings.push({start:i,end:i,content:after.substring(0,ei)});inDoc=false;docType=null;}
          else docContent=[after];
        }
      } else {
        const ei=l.indexOf(docType);
        if(ei!==-1){docContent.push(l.substring(0,ei));docstrings.push({start:docStart,end:i,content:docContent.join('\n')});inDoc=false;docType=null;docContent=[];}
        else docContent.push(l);
      }
    }
    const probDoc=docstrings[0]||null;
    const outDoc=docstrings.length>1?docstrings[docstrings.length-1]:null;
    const excluded=[];
    if(probDoc) excluded.push({start:probDoc.start,end:probDoc.end});
    if(outDoc) excluded.push({start:outDoc.start,end:outDoc.end});
    let codeLines=[];
    for(let i=0;i<lines.length;i++){
      if(!excluded.some(r=>i>=r.start&&i<=r.end)) codeLines.push(lines[i]);
    }
    while(codeLines.length&&codeLines[0].trim()==='') codeLines.shift();
    while(codeLines.length&&codeLines[codeLines.length-1].trim()==='') codeLines.pop();
    return { problemStatement:probDoc?probDoc.content.trim():null, code:codeLines.join('\n'), output:outDoc?outDoc.content.trim():null };
  }

  // ─── SYNTAX HIGHLIGHTER ──────────────────────────────────────────
  function highlightPythonLines(text) {
    let src = escapeHtml(text);
    const ph=[]; const put=h=>{const id=`@@T${ph.length}@@`;ph.push(h);return id;};
    src=src.replace(/((?:"""|''')[\s\S]*?(?:"""|'''|$))/g,m=>put(`<span class="tok-string">${m}</span>`));
    src=src.replace(/"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'/g,m=>put(`<span class="tok-string">${m}</span>`));
    src=src.replace(/(#.*?$)/gm,(_,p)=>put(`<span class="tok-comment">${p}</span>`));
    src=src.replace(/(@[_A-Za-z][_\w\.]*)/g,(_,p)=>put(`<span class="tok-decorator">${p}</span>`));
    const kws=['False','None','True','and','as','assert','async','await','break','class','continue','def','del','elif','else','except','finally','for','from','global','if','import','in','is','lambda','nonlocal','not','or','pass','raise','return','try','while','with','yield'];
    src=src.replace(new RegExp(`\\b(${kws.join('|')})\\b`,'g'),'<span class="tok-keyword">$1</span>');
    const bis=['print','range','len','str','int','float','list','dict','set','tuple','bool','enumerate','zip','map','filter','sum','min','max','open','input','type','abs','round','sorted','reversed','any','all'];
    src=src.replace(new RegExp(`\\b(${bis.join('|')})\\b`,'g'),'<span class="tok-builtin">$1</span>');
    src=src.replace(/\b(0x[0-9a-fA-F]+|\d+(?:\.\d+)?(?:e[+-]?\d+)?)\b/g,'<span class="tok-number">$1</span>');
    src=src.replace(/\b(def)(\s+)([_A-Za-z][_\w]*)/g,(_,k,s,n)=>`<span class="tok-keyword">${k}</span>${s}<span class="tok-defname">${n}</span>`);
    src=src.replace(/\b(class)(\s+)([_A-Za-z][_\w]*)/g,(_,k,s,n)=>`<span class="tok-keyword">${k}</span>${s}<span class="tok-classname">${n}</span>`);
    src=src.replace(/@@T(\d+)@@/g,(_,i)=>ph[Number(i)]||'');
    return src.split('\n');
  }

  // ─── PREFETCH ────────────────────────────────────────────────────
  async function prefetchSmallFiles() {
    const candidates=state.fileIndex.slice(0,50); const concurrency=4; let idx=0;
    const step=async()=>{
      if(idx>=candidates.length)return;
      const f=candidates[idx++];
      try{
        const key=`${state.defaultBranch}:${f.path}`;
        if(!state.contentCache.has(key)){
          const url=`https://raw.githubusercontent.com/${OWNER}/${REPO}/${encodeURIComponent(state.defaultBranch)}/${encodeURI(f.path)}`;
          const res=await fetch(url);
          if(res.ok){const chunks=[];const reader=res.body.getReader();let recv=0;while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);recv+=value.byteLength;if(recv>100*1024)break;}state.contentCache.set(key,new TextDecoder().decode(concatU8(chunks)));}
        }
      }catch(e){}finally{step();}
    };
    for(let i=0;i<concurrency&&i<candidates.length;i++)step();
  }

  // ─── Activity Bar Switching ───────────────────────────────────────
  $('actExplorer').addEventListener('click', ()=>{
    $('actExplorer').classList.add('active');
    $('actSearch').classList.remove('active');
    $('explorerPanel').style.display='';
    $('searchPanel').style.display='none';
    $('sidebarTitle').textContent='Explorer';
  });
  $('actSearch').addEventListener('click', ()=>{
    $('actSearch').classList.add('active');
    $('actExplorer').classList.remove('active');
    $('explorerPanel').style.display='none';
    $('searchPanel').style.display='flex';
    $('sidebarTitle').textContent='Search';
    $('sidebarSearchInput').focus();
  });
  $('actGit').addEventListener('click', ()=>{
    window.open(`https://github.com/${OWNER}/${REPO}`,'_blank','noopener');
  });

  // Sidebar search
  $('sidebarSearchInput').addEventListener('keydown', e=>{
    if(e.key==='Enter'){ const q=$('sidebarSearchInput').value.trim(); if(q) navigate({view:'search',q}); }
  });

  // Title search
  $('titleSearchInput').addEventListener('keydown', e=>{
    if(e.key==='Enter'){ const q=$('titleSearchInput').value.trim(); if(q) navigate({view:'search',q}); }
  });

  // Collapse sidebar
  $('collapseBtn').addEventListener('click', ()=>{
    const sb=$('sidebar');
    sb.classList.toggle('collapsed');
  });

  window.addEventListener('popstate', ()=>render());

  document.addEventListener('DOMContentLoaded', ()=>{
    init().catch(err=>{
      $('editor-content').innerHTML=`<div style="padding:20px;color:#f44747;">Failed to load repository. Check console for details.</div>`;
      console.error(err);
      document.body.classList.remove('preinit');
    });
  });
</script>
</body>
</html>
